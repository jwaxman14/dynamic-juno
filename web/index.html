<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Team — Multi-Agent System</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar: Project Nav -->
        <aside class="sidebar left-sidebar">
            <div class="sidebar-header">
                <h2>📚 Projects</h2>
            </div>
            <div class="sidebar-content">
                <div class="project-info">
                    <p class="label">Current Book</p>
                    <h3 id="book-name-display">Not set</h3>
                </div>
                <div class="nav-links">
                    <a href="#" class="active">Chat</a>
                    <a href="#">Outline</a>
                    <a href="#">Drafts</a>
                    <a href="#">Voice Profiles</a>
                </div>
            </div>
        </aside>

        <!-- Center: Main Chat -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="agent-status" id="active-agent-status">
                    <span class="status-dot"></span>
                    <span id="active-agent-name">Coordinator</span>
                </div>
            </header>
            
            <div class="chat-history" id="chat-history">
                <div class="message assistant coordinator">
                    <div class="message-content">
                        Hello! I'm your Coordinator. Are we starting a new book project or continuing an existing one?
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <textarea id="message-input" placeholder="Message your team... (Use @agent to force routing)" rows="1"></textarea>
                    <button type="submit" id="send-button">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>

        <!-- Right Sidebar: Status Panels -->
        <aside class="sidebar right-sidebar">
            <div class="sidebar-header">
                <h2>Activity</h2>
            </div>
            <div class="sidebar-content">
                <!-- Research Panel -->
                <div class="panel research-panel">
                    <h3>🔬 Research Output</h3>
                    <div class="panel-state" id="research-state">
                        <p class="empty-state">No active research.</p>
                    </div>
                </div>

                <!-- Editor Panel -->
                <div class="panel editor-panel">
                    <h3>📝 Editor Reports</h3>
                    <div class="panel-state" id="editor-state">
                        <p class="empty-state">No recent edits.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
